# Compose BASE — use sozinho em CASA (VPN, sem proxy):
#   docker compose up -d --build
# Ajuste: <servico> (nome do serviço/imagem/container) e a porta, se necessário.
services:
  <servico>:
    # Build sem proxy (casa/VPN). No escritório, o docker-compose.office.yml injeta o proxy do .env
    # nos build.args (pip/apt). Runtime pega tudo do .env via env_file abaixo.
    build:
      context: .
    image: <servico>
    container_name: <servico>
    ports:
      - "8000:8000"
    # env_file passa TODAS as vars do .env pro runtime (HTTP_PROXY/HTTPS_PROXY/NO_PROXY,
    # SSL_VERIFY, DATABASE_URL, etc.) — sem depender do proxy do Docker Desktop.
    env_file:
      - .env
    networks:
      - mitiai_network              # mesma rede dos demais containers internos
    mem_limit: 512m
    restart: unless-stopped
networks:
  mitiai_network:
    name: mitiai_network
    external: true                  # já existe (criada por outro stack); não recriar aqui
