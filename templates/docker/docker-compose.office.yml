# Override SÓ PRA EMPRESA (rede MSIG com proxy corporativo).
# Em CASA (VPN, sem proxy):  docker compose up -d --build
# Na EMPRESA (proxy MSIG):   docker compose -f docker-compose.yml -f docker-compose.office.yml up -d --build
#
# O que este arquivo faz: injeta o proxy do `.env` nos build.args (pip/apt do BUILD saem pelo proxy).
# O runtime já pega o proxy do `.env` via env_file do compose base. Preencha HTTP_PROXY/HTTPS_PROXY/
# NO_PROXY no `.env` da máquina do escritório (valores em docs/AMBIENTE.md §2) — NADA hardcoded aqui.
#
# Gotcha: o pull da imagem base (FROM) é tarefa do DAEMON e NÃO usa estes args. Se der
# `load metadata ... i/o timeout`, ver docs/AMBIENTE.md (proxy no Docker Desktop OU `docker pull python:3.12-slim`).
services:
  <servico>:
    build:
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
