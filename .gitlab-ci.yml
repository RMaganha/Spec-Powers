# CI do kit mss-spec (item 12) — roda a suíte e publica os artefatos de teste que o
# GitLab renderiza nativamente: JUnit XML (resultados + tendência de duração ao longo
# dos runs) e Cobertura XML (cobertura no MR/diff). Os artefatos são EFÊMEROS do CI;
# a saída de run (report.xml, coverage.xml) nunca é commitada — está no .gitignore.
#
# PREPARADO, NÃO ATIVADO (placeholder, como o item 9): o `git remote` está vazio, então
# não há host onde este pipeline rode ainda. Ativar é passo manual do owner quando o
# host git interno existir — adicionar o remote (a URL entra como <URL-do-git-interno>,
# ver docs/LEIA-ME.md) e dar push. Nada aqui aponta pra um host inventado.
#
# Os flags de artefato vivem no comando do job (não no addopts do pytest), de propósito:
# assim o `pytest -q` local segue limpo e sem exigir pytest-cov.

stages:
  - test

test:
  stage: test
  image: python:3.12-slim
  script:
    - pip install --no-cache-dir pytest pytest-cov PyYAML
    - >
      python -m pytest -q
      --junitxml=report.xml
      --cov=. --cov-report=xml --cov-report=term
  coverage: '/^TOTAL\s+.*\s+(\d+(?:\.\d+)?)%/'
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - report.xml
      - coverage.xml
    expire_in: 30 days
